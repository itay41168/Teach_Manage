<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>מערכת מעקב תלמידים</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- ========= מסך כיתות ========= -->
  <div id="classesScreen">
    <h1>כיתות</h1>
    <div id="classesContainer" class="classes-grid"></div>
    <button id="addClassBtn" class="add-btn">+ הוסף כיתה</button>
  </div>

  <!-- ========= מסך חודשים ========= -->
  <div id="monthsScreen" style="display:none;">
    <button id="backToClasses" class="back-btn">← חזרה לכיתות</button>
    <h1 id="monthsTitle"></h1>
    <div id="monthsContainer" class="classes-grid"></div>
    <button id="addMonthBtn" class="add-btn">+ הוסף חודש</button>
   
  </div>

  <!-- ========= מסך מעקב ========= -->
    <div id="trackingScreen" style="display:none;">
    <button id="backToMonths" class="back-btn">← חזרה לחודשים</button>
    <h1 id="trackingTitle"></h1>

    <table class="tracking-table">
      <thead>
        <tr>
          <th>יום</th>
          <th>תאריך</th>
          <th>סטטוס</th>
          <th>הערות</th>
          <th>פעולה</th>
        </tr>
      </thead>
      <tbody id="trackingBody"></tbody>
    </table>

     <div>
      <button id="exportExcelBtn" class="add-btn">📊 Export Excel</button>
      <button id="statsBtn" class="add-btn">📈 סטטיסטיקה</button>
    </div>

    <button id="addDayBtn" class="add-btn">+ הוסף יום</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
